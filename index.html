<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Engineering Sheet</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Mono','Courier New',monospace;background:#0a0a0a;color:#e8e8e8;min-height:100vh}

  /* SPONSOR BAR */
  .sponsor-bar{background:#111;border-bottom:1px solid #1e1e1e;padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:13px;color:#666}
  .sponsor-bar a{color:#7dd3a8;text-decoration:none;font-weight:600}

  /* NAV */
  nav{background:#0d0d0d;border-bottom:1px solid #1e1e1e;padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#e8e8e8;font-weight:600;font-size:15px}
  .logo-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#7dd3a8,#4ade80);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .sign-in{background:transparent;border:1px solid #2a2a2a;color:#888;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
  .sign-in:hover{border-color:#444;color:#ccc}

  /* HERO */
  .hero{max-width:900px;margin:0 auto;padding:52px 32px 24px}
  .hero h1{font-size:36px;font-weight:700;margin-bottom:6px;letter-spacing:-1px;color:#fff}
  .hero .date{font-size:13px;color:#444;margin-bottom:8px}
  .hero .desc{font-size:14px;color:#666;margin-bottom:32px}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:28px}
  .tab{background:transparent;border:1px solid #222;color:#555;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
  .tab.active{background:#1a2a1f;border-color:#2d5a3d;color:#7dd3a8}
  .tab:hover:not(.active){border-color:#333;color:#999}

  /* PROGRESS CARD */
  .progress-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:20px 24px;margin-bottom:36px}
  .progress-label{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
  .progress-bar{height:6px;background:#1a1a1a;border-radius:3px;margin-bottom:16px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#4ade80,#7dd3a8);border-radius:3px;transition:width .4s ease;width:0%}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat-card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:8px;padding:12px 16px}
  .stat-val{font-size:22px;font-weight:600;color:#fff;display:block}
  .stat-lbl{font-size:11px;color:#555;margin-top:3px}

  /* MAIN */
  main{max-width:900px;margin:0 auto;padding:0 32px 80px}

  /* SECTION */
  .section{margin-bottom:28px}
  .section-head{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #1a1a1a;cursor:pointer;user-select:none}
  .section-head:hover .section-title{color:#fff}
  .section-title{font-size:17px;font-weight:600;color:#ddd;flex:1}
  .section-count{font-size:12px;color:#3a3a3a}
  .chevron{font-size:14px;color:#333;transition:transform .2s;line-height:1}
  .chevron.open{transform:rotate(180deg)}

  /* BADGE */
  .badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
  .badge.core{background:#1a2a1f;color:#7dd3a8;border:1px solid #2d5a3d}
  .badge.optional{background:#1a1a2e;color:#8888cc;border:1px solid #2a2a4a}

  /* TABLE */
  .section-body{overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead tr{border-bottom:1px solid #1a1a1a}
  th{font-size:10px;color:#333;text-transform:uppercase;letter-spacing:.8px;padding:10px 0;text-align:left;font-weight:500}
  th.th-star{width:40px;text-align:center}
  th.th-status{width:64px}
  tbody tr{border-bottom:1px solid #111;transition:background .1s}
  tbody tr.done{background:#0d150f}
  td{padding:14px 0;vertical-align:top}
  td.td-status{width:52px;padding-top:16px}
  td.td-star{width:40px;text-align:center;padding-top:16px}

  /* CHECKBOX */
  .checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid #2a2a2a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .checkbox.checked{background:#4ade80;border-color:#4ade80}
  .checkbox.checked::after{content:'✓';color:#0a0a0a;font-size:11px;line-height:1}

  /* TOPIC */
  .topic-title{font-size:14px;font-weight:500;color:#ddd;margin-bottom:3px;transition:color .1s}
  .done .topic-title{color:#444;text-decoration:line-through}
  .topic-desc{font-size:12px;color:#555;margin-bottom:8px;line-height:1.5}
  .resources{display:flex;gap:6px;flex-wrap:wrap}
  .res-link{font-size:11px;color:#7dd3a8;text-decoration:none;background:#0d1f14;border:1px solid #1e3828;border-radius:4px;padding:3px 8px;transition:all .1s}
  .res-link:hover{background:#112418;border-color:#2d5a3d}

  /* STAR */
  .star-btn{background:none;border:none;cursor:pointer;font-size:18px;color:#222;padding:0;transition:color .15s;line-height:1}
  .star-btn.on{color:#fbbf24}
  .star-btn:hover{color:#fbbf24}

  /* PROJECTS */
  .projects-label{font-size:11px;color:#333;text-transform:uppercase;letter-spacing:1px;padding:20px 0 12px;font-weight:500}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;padding-bottom:8px}
  .proj-card{background:#0e0e0e;border:1px solid #1a1a1a;border-radius:8px;padding:16px;transition:border-color .15s}
  .proj-card.done{background:#0d150f;border-color:#1e3828}
  .proj-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .proj-title{font-size:14px;font-weight:500;color:#ccc;line-height:1.4}
  .proj-desc{font-size:12px;color:#555;margin-bottom:12px;line-height:1.5}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#141414;border:1px solid #1e1e1e;color:#555}
  .proj-footer{display:flex;align-items:center;justify-content:space-between}
  .spec-link{font-size:11px;color:#7dd3a8;text-decoration:none}
  .spec-link:hover{color:#a7f3d0}
  .proj-check{width:16px;height:16px;border-radius:3px;border:1.5px solid #222;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .proj-check.checked{background:#4ade80;border-color:#4ade80}
  .proj-check.checked::after{content:'✓';color:#0a0a0a;font-size:10px;line-height:1}

  /* EMPTY */
  .empty{padding:64px 0;text-align:center;color:#2a2a2a;font-size:14px}

  @media(max-width:640px){
    .hero{padding:32px 16px 16px}
    main{padding:0 16px 60px}
    nav{padding:12px 16px}
    .stats-row{grid-template-columns:repeat(3,1fr);gap:8px}
    .stat-val{font-size:18px}
  }
</style>
</head>

</div>

const TOTAL_TOPICS   = DATA.reduce((a,s)=>a+s.topics.length,0);
const TOTAL_PROJECTS = DATA.reduce((a,s)=>a+s.projects.length,0);

const state = { completed:{}, starred:{}, collapsed:{}, view:"tutorial" };

/* ── helpers ── */
function save(){ try{ localStorage.setItem('bp_state', JSON.stringify({completed:state.completed,starred:state.starred})) }catch(e){} }
function load(){ try{ const d=JSON.parse(localStorage.getItem('bp_state')||'{}'); Object.assign(state.completed,d.completed||{}); Object.assign(state.starred,d.starred||{}) }catch(e){} }

function updateProgress(){
  let doneT=0, doneP=0;
  DATA.forEach(s=>{
    s.topics.forEach(t=>{ if(state.completed[t.id]) doneT++ });
    s.projects.forEach(p=>{ if(state.completed[p.id]) doneP++ });
  });
  const total=doneT+doneP, max=TOTAL_TOPICS+TOTAL_PROJECTS;
  const pct=Math.round(total/max*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('stat-total').textContent=total+'/'+max;
  document.getElementById('stat-topics').textContent=doneT+'/'+TOTAL_TOPICS;
  document.getElementById('stat-projects').textContent=doneP+'/'+TOTAL_PROJECTS;
}

/* ── render ── */
function render(){
  const main=document.getElementById('main-content');
  const isStarred=state.view==='starred';

  const visible=DATA.map(s=>({
    ...s,
    topics:   isStarred ? s.topics.filter(t=>state.starred[t.id])   : s.topics,
    projects: isStarred ? s.projects.filter(p=>state.starred[p.id]) : s.projects,
  })).filter(s=>s.topics.length||s.projects.length);

  if(visible.length===0){
    main.innerHTML='<div class="empty">No starred items yet — star topics to see them here.</div>';
    return;
  }

  main.innerHTML=visible.map(sec=>{
    const isOpen=!state.collapsed[sec.id];
    const allItems=[...sec.topics,...sec.projects];
    const secDone=allItems.filter(i=>state.completed[i.id]).length;

    const topicsHTML=sec.topics.length===0?'':/*html*/`
      <table>
        <thead><tr>
          <th class="th-status">Status</th>
          <th>Topic</th>
          <th class="th-star">⭐</th>
        </tr></thead>
        <tbody>
          ${sec.topics.map(t=>{
            const done=!!state.completed[t.id];
            const on=!!state.starred[t.id];
            return `<tr class="${done?'done':''}" id="row-${t.id}">
              <td class="td-status">
                <div class="checkbox ${done?'checked':''}" data-toggle="${t.id}"></div>
              </td>
              <td>
                <div class="topic-title">${t.title}</div>
                <div class="topic-desc">${t.desc}</div>
                <div class="resources">${t.resources.map(r=>`<a class="res-link" href="${r.url}" target="_blank" rel="noreferrer">${r.label}</a>`).join('')}</div>
              </td>
              <td class="td-star">
                <button class="star-btn ${on?'on':''}" data-star="${t.id}">★</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;

    const projectsHTML=sec.projects.length===0?'':/*html*/`
      <div class="projects-label">Hands-On Projects</div>
      <div class="projects-grid">
        ${sec.projects.map(p=>{
          const done=!!state.completed[p.id];
          const on=!!state.starred[p.id];
          return `<div class="proj-card ${done?'done':''}" id="proj-${p.id}">
            <div class="proj-card-top">
              <div class="proj-title">${p.title}</div>
              <button class="star-btn ${on?'on':''}" data-star="${p.id}">★</button>
            </div>
            <div class="proj-desc">${p.desc}</div>
            <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <div class="proj-footer">
              <a class="spec-link" href="${p.spec}" target="_blank" rel="noreferrer">View Spec →</a>
              <div class="proj-check ${done?'checked':''}" data-toggle="${p.id}"></div>
            </div>
          </div>`;
        }).join('')}
      </div>`;

    return `<div class="section" id="sec-${sec.id}">
      <div class="section-head" data-collapse="${sec.id}">
        <span class="badge ${sec.badge}">${sec.badge}</span>
        <h2 class="section-title">${sec.title}</h2>
        <span class="section-count">${secDone}/${allItems.length}</span>
        <span class="chevron ${isOpen?'open':''}">▾</span>
      </div>
      <div class="section-body" style="display:${isOpen?'block':'none'}">
        ${topicsHTML}
        ${projectsHTML}
      </div>
    </div>`;
  }).join('');

  updateProgress();
}

/* ── event delegation ── */
document.getElementById('main-content').addEventListener('click',e=>{
  /* collapse */
  const head=e.target.closest('[data-collapse]');
  if(head){ const id=head.dataset.collapse; state.collapsed[id]=!state.collapsed[id]; render(); return; }

  /* checkbox / proj-check */
  const box=e.target.closest('[data-toggle]');
  if(box){ const id=box.dataset.toggle; state.completed[id]=!state.completed[id]; save(); render(); return; }

  /* star */
  const star=e.target.closest('[data-star]');
  if(star){ const id=star.dataset.star; state.starred[id]=!state.starred[id]; save(); render(); return; }
});

/* ── tabs ── */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.view=btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b===btn));
    render();
  });
});

load();
render();
</script>
